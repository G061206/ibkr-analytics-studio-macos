name: macOS Build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "web/**"
      - "macos/**"
      - ".github/workflows/macos-build.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "web/**"
      - "macos/**"
      - ".github/workflows/macos-build.yml"

permissions:
  contents: read

concurrency:
  group: macos-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and package (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: ARM64
          - os: macos-15-intel
            arch: X64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Check frontend syntax
        working-directory: web
        run: npm run check

      - name: Smoke test sample parser
        working-directory: web
        run: npm run smoke

      - name: Build macOS shell
        working-directory: macos
        run: swift build -v

      - name: Package unsigned macOS app
        run: bash macos/scripts/package_app.sh

      - name: Upload unsigned installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: IBKRAnalyticsStudio-macOS-unsigned-${{ matrix.arch }}
          path: |
            dist/*.zip
            dist/*.dmg
          if-no-files-found: error
