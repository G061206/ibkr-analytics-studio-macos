name: macOS Build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "web/**"
      - "macos/**"
      - ".github/workflows/macos-build.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "web/**"
      - "macos/**"
      - ".github/workflows/macos-build.yml"

permissions:
  contents: read

concurrency:
  group: macos-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Swift macOS scaffold
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Check frontend syntax
        working-directory: web
        run: npm run check

      - name: Smoke test sample parser
        working-directory: web
        run: npm run smoke

      - name: Build macOS shell
        working-directory: macos
        run: swift build -v

      - name: Package unsigned macOS app
        run: bash macos/scripts/package_app.sh

      - name: Upload unsigned installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: IBKRAnalyticsStudio-macOS-unsigned-${{ runner.arch }}
          path: |
            dist/*.zip
            dist/*.dmg
          if-no-files-found: error
